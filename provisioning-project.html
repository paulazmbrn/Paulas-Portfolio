              <div className="two-col-left">
                <div className="section-label">{t.context_label}</div>
                <h2>{t.context_h_a}<br/><em>{t.context_h_b}</em></h2>
              </div>
              <div className="body-text">
                <p>{t.context_p1}</p>
                <p>{t.context_p2}</p>
              </div>
            </div>
          </section>

          {/* OBJECTIVE + DATASET */}
          <div className="dark-section">
            <div className="dark-inner">
              <div className="fade-up" ref={r2}>
                <div className="section-label">{t.obj_label}</div>
                <h2 className="section-heading">{t.obj_h_a}<br/><em>{t.obj_h_b}</em></h2>
                <div className="obj-grid">
                  {t.obj_cards.map((c,i) => (
                    <div key={i} className="phase-card" style={{marginBottom:0}}>
                      <div className="phase-num">{c.num}</div>
                      <div className="phase-label">{c.label}</div>
                      <div className="phase-title">{c.title}</div>
                      <div className="phase-body">{c.body}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="fade-up" ref={r3} style={{marginTop:'4rem'}}>
                <div className="section-label">{t.dataset_label}</div>
                <h2 className="section-heading"><em>{t.dataset_h_a}</em>{t.dataset_h_b}</h2>
                <div className="body-text">
                  <p><a href="https://www.kaggle.com/competitions/rossmann-store-sales/overview" target="_blank" rel="noopener noreferrer">{t.dataset_link}</a></p>
                  <p>{t.dataset_p1}</p>
                  <p>{t.dataset_p2}</p>
                </div>
              </div>
            </div>
          </div>

          {/* EDA */}
          <section className="content-section">
            <div className="fade-up" ref={r4}>
              <div className="section-label">{t.eda_label}</div>
              <h2 className="section-heading">{t.eda_h_a}<br/><em>{t.eda_h_b}</em></h2>
              <div className="body-text"><p>{t.eda_p}</p></div>
              <div className="img-block">
                {EDA_IMGS.map((img,i) => (
                  <div key={i}>
                    <img src={`assets/provisioning/${img}.png`} alt={t.eda_captions[i]} loading="lazy" />
                    <p className="img-caption-light">{t.eda_captions[i]}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* FORECASTING */}
          <div className="dark-section">
            <div className="dark-inner">
              <div className="fade-up" ref={r5}>
                <div className="section-label">{t.forecast_label}</div>
                <h2 className="section-heading">{t.forecast_h_a}<br/><em>{t.forecast_h_b}</em></h2>
                <div className="body-text">
                  <p>{t.forecast_p1}</p>
                  <p>{t.forecast_p2}</p>
                </div>
                <div className="img-block">
                  {FORE_IMGS.map((img,i) => (
                    <div key={i}>
                      <img src={`assets/provisioning/${img}.png`} alt={t.forecast_captions[i]} loading="lazy" />
                      <p className="img-caption-dark">{t.forecast_captions[i]}</p>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* INVENTORY */}
          <section className="content-section">
            <div className="fade-up" ref={r6}>
              <div className="section-label">{t.inventory_label}</div>
              <h2 className="section-heading">{t.inventory_h_a}<br/><em>{t.inventory_h_b}</em></h2>
              <div className="body-text">
                <p>{t.inventory_p1}</p>
                <p>{t.inventory_p2}</p>
              </div>
              <div className="img-block">
                {INV_IMGS.map((img,i) => (
                  <div key={i}>
                    <img src={`assets/provisioning/${img}.png`} alt={t.inventory_captions[i]} loading="lazy" />
                    <p className="img-caption-light">{t.inventory_captions[i]}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* TABLEAU DASHBOARD */}
          <section className="tableau-section">
            <div className="tableau-inner">
              <div className="fade-up" ref={r12}>
                <div className="section-label">{t.tableau_label}</div>
                <h2 className="section-heading">{t.tableau_h_a}<br/><em>{t.tableau_h_b}</em></h2>
              </div>
              <div className="tableau-embed" ref={tableauRef}></div>
            </div>
          </section>

          {/* FINDINGS + TABLE */}
          <div className="dark-section">
            <div className="dark-inner">
              <div className="fade-up" ref={r7}>
                <div className="section-label">{t.findings_label}</div>
                <h2 className="section-heading">{t.findings_h_a}<br/><em>{t.findings_h_b}</em></h2>
                <div className="findings-grid">
                  {t.findings.map((f,i) => (
                    <div key={i} className="finding-card">
                      <div className="finding-num">{f.num}</div>
                      <div className="finding-text" dangerouslySetInnerHTML={{__html: f.text}} />
                    </div>
                  ))}
                </div>
              </div>

              <div className="fade-up" ref={r8} style={{marginTop:'4rem'}}>
                <div className="section-label">{t.table_label}</div>
                <h2 className="section-heading" style={{marginBottom:'0.5rem'}}>{t.table_h_a}<br/><em>{t.table_h_b}</em></h2>
                <p style={{fontSize:'0.75rem',color:'rgba(230,230,218,0.35)',letterSpacing:'0.05em',marginBottom:'1rem'}}>{t.table_note}</p>
                <div className="table-wrap">
                  <table>
                    <thead>
                      <tr>{t.table_headers.map((h,i) => <th key={i}>{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {TABLE_DATA.map((row,i) => (
                        <tr key={i}>{row.map((cell,j) => <td key={j}>{cell}</td>)}</tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          {/* LIMITATIONS */}
          <section className="content-section">
            <div className="two-col fade-up" ref={r9}>
              <div className="two-col-left">
                <div className="section-label">{t.limits_label}</div>
                <h2>{t.limits_h_a}<br/><em>{t.limits_h_b}</em></h2>
              </div>
              <div className="body-text">
                <p>{t.limits_p1}</p>
                <p>{t.limits_p2}</p>
                <p>{t.limits_p3}</p>
                <div className="stack-pills" style={{marginTop:'2rem'}}>
                  <div className="section-label" style={{width:'100%',marginBottom:'0.5rem'}}>{t.stack_label}</div>
                  {STACK.map((s,i) => <span key={i} className="stack-pill">{s}</span>)}
                </div>
              </div>
            </div>
          </section>

          {/* GITHUB CTA */}
          <div className="github-cta">
            <h2>{t.cta_h}</h2>
            <p>{t.cta_p}</p>
            <a href="https://github.com/paulazmbrn/provisioning-project" target="_blank" rel="noopener noreferrer" className="github-btn">{t.cta_btn}</a>
          </div>

          {/* FOOTER */}
          <footer>
            <span className="footer-logo">paulas.world</span>
            <span className="footer-copy">© 2026 Paula Zambrano</span>
            <span className="footer-note">{t.footer_note}</span>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
