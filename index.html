<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Paula Zambrano</title>
  <meta name="description" content="Portfolio of Paula Zambrano — Golf Professional, Data Scientist, Travel Advisor." />
  <meta property="og:title" content="Portfolio — Paula Zambrano" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://portfolio.paulas.world" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #2a4226;
      --linen:  #e6e6da;
      --pink:   #f05485;
      --ink:    #1c1c1a;
      --muted:  #6b6b60;
      --white:  #ffffff;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--linen); color: var(--ink); overflow-x: hidden; }

    /* CURSOR */
    .cursor { width: 12px; height: 12px; background: var(--pink); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .2s, height .2s, background .2s; mix-blend-mode: multiply; }
    .cursor.expand { width: 30px; height: 30px; background: var(--forest); }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; background: var(--forest); }
    .nav-logo { font-family: 'Krona One', sans-serif; font-size: 1.1rem; color: var(--linen); text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .nav-pill { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.3rem 0.85rem; border-radius: 999px; border: 1.5px solid rgba(230,230,218,0.35); background: transparent; color: rgba(230,230,218,0.6); text-decoration: none; transition: all .2s; }
    .nav-pill:hover { border-color: rgba(230,230,218,0.7); color: var(--linen); }
    .nav-pill.active { background: var(--linen); color: var(--forest); border-color: var(--linen); }

    /* HERO */
    .hero { min-height: 100vh; background: var(--forest); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8rem 2rem 6rem; position: relative; overflow: hidden; }
    .hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 70% 55% at 50% 45%, rgba(240,84,133,0.09) 0%, transparent 70%); pointer-events:none; }
    .hero::after { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(230,230,218,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(230,230,218,0.03) 1px,transparent 1px); background-size: 60px 60px; pointer-events:none; }
    .hero-eyebrow { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--pink); margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .hero-name { font-family: 'Krona One', sans-serif; font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 400; color: var(--linen); line-height: 1; letter-spacing: -0.02em; margin-bottom: 2rem; position: relative; z-index: 1; }
    .hero-name em { color: var(--pink); font-style: normal; }
    .hero-tagline { font-size: clamp(0.82rem, 1.6vw, 0.98rem); font-weight: 300; letter-spacing: 0.1em; color: rgba(230,230,218,0.6); margin-bottom: 2.5rem; position: relative; z-index: 1; }
    .hero-pills { display: flex; gap: 0.65rem; flex-wrap: wrap; justify-content: center; margin-bottom: 4.5rem; position: relative; z-index: 1; }
    .hero-pill { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; padding: 0.4rem 1rem; border-radius: 999px; border: 1.5px solid rgba(230,230,218,0.2); color: rgba(230,230,218,0.65); }
    .hero-scroll { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: rgba(230,230,218,0.35); font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; animation: bob 2.2s ease-in-out infinite; }
    .hero-scroll-line { width: 1px; height: 44px; background: linear-gradient(to bottom, rgba(230,230,218,0.35), transparent); }
    @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(7px)} }

    /* MARQUEE */
    .marquee-wrap { overflow: hidden; background: var(--pink); padding: 0.65rem 0; }
    .marquee-track { display: flex; white-space: nowrap; animation: marquee 30s linear infinite; }
    .marquee-item { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--white); padding: 0 2rem; }
    @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    /* SHARED */
    .section-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--pink); margin-bottom: 0.9rem; }
    .section-heading { font-family: 'Krona One', sans-serif; font-size: clamp(1.9rem, 4vw, 3rem); font-weight: 400; color: var(--forest); line-height: 1.1; }
    .fade-up { opacity: 0; transform: translateY(26px); transition: opacity .72s ease, transform .72s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* INTRO */
    .intro-section { padding: 6rem 3rem; max-width: 900px; margin: 0 auto; }
    .intro-inner { display: grid; grid-template-columns: 1fr 1.6fr; gap: 4rem; align-items: start; }
    .intro-left h2 { font-family: 'Krona One', sans-serif; font-size: clamp(1.8rem, 3.5vw, 2.6rem); color: var(--forest); line-height: 1.1; margin-top: 0.6rem; }
    .intro-left h2 em { color: var(--pink); font-style: normal; }
    .intro-right p { font-size: 0.92rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.1rem; }
    .intro-right p:last-child { margin-bottom: 0; }

    /* PORTFOLIO GRID */
    .portfolio-section { background: var(--forest); padding: 6rem 3rem; }
    .portfolio-inner { max-width: 1100px; margin: 0 auto; }
    .portfolio-heading { font-family: 'Krona One', sans-serif; font-size: clamp(1.8rem,4vw,2.8rem); color: var(--linen); margin-bottom: 3rem; line-height: 1.1; }
    .portfolio-heading em { color: var(--pink); font-style: normal; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.75rem; }
    .portfolio-card { background: rgba(230,230,218,0.06); border: 1px solid rgba(230,230,218,0.12); border-radius: 1.5rem; padding: 2rem; display: flex; flex-direction: column; transition: background .25s, border-color .25s; }
    .portfolio-card:hover { background: rgba(230,230,218,0.1); border-color: rgba(240,84,133,0.35); }
    .portfolio-card.wide { grid-column: span 2; }
    .card-num { font-family: 'Krona One', sans-serif; font-size: 3.5rem; color: rgba(240,84,133,0.18); line-height: 1; margin-bottom: 1.25rem; }
    .card-tag { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--pink); margin-bottom: 0.5rem; }
    .card-title { font-family: 'Krona One', sans-serif; font-size: 1.1rem; color: var(--linen); margin-bottom: 0.75rem; line-height: 1.25; }
    .portfolio-card.wide .card-title { font-size: 1.35rem; }
    .card-desc { font-size: 0.82rem; line-height: 1.7; color: rgba(230,230,218,0.55); flex: 1; }
    .card-tools { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1.5rem; }
    .card-tool { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.25rem 0.7rem; border-radius: 999px; border: 1px solid rgba(230,230,218,0.18); color: rgba(230,230,218,0.5); }
    .card-link { display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1.5rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--pink); text-decoration: none; transition: gap .2s; }
    .card-link:hover { gap: 0.7rem; }

    /* DIVIDER */
    .divider-section { padding: 6rem 3rem; max-width: 900px; margin: 0 auto; }
    .divider-inner { display: grid; grid-template-columns: 1fr 1.6fr; gap: 4rem; align-items: start; }
    .divider-left h2 { font-family: 'Krona One', sans-serif; font-size: clamp(1.8rem, 3.5vw, 2.4rem); color: var(--forest); line-height: 1.1; margin-top: 0.6rem; }
    .divider-left h2 em { color: var(--pink); font-style: normal; }
    .divider-right p { font-size: 0.92rem; line-height: 1.85; color: var(--muted); margin-bottom: 1.1rem; }
    .divider-right a { color: var(--forest); font-weight: 600; }

    /* CONTACT CALLOUT */
    .contact-callout { background: var(--pink); padding: 4rem 3rem; text-align: center; }
    .contact-callout h2 { font-family: 'Krona One', sans-serif; font-size: clamp(1.6rem,4vw,2.6rem); color: var(--white); margin-bottom: 0.75rem; }
    .contact-callout p { font-size: 0.9rem; color: rgba(255,255,255,0.8); max-width: 480px; margin: 0 auto 2rem; line-height: 1.7; }
    .contact-btn { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.85rem 2.2rem; border-radius: 999px; background: var(--white); color: var(--pink); text-decoration: none; transition: background .2s, color .2s; }
    .contact-btn:hover { background: var(--forest); color: var(--white); }

    /* FOOTER */
    footer { background: var(--forest); padding: 1.75rem 3rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
    .footer-logo { font-family: 'Krona One', sans-serif; font-size: 0.9rem; color: rgba(230,230,218,0.55); }
    .footer-copy { font-size: 0.72rem; color: rgba(230,230,218,0.45); }
    .footer-note { font-size: 0.68rem; color: rgba(230,230,218,0.3); letter-spacing: 0.05em; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .portfolio-grid { grid-template-columns: 1fr 1fr; }
      .portfolio-card.wide { grid-column: span 2; }
    }
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .intro-inner, .divider-inner { grid-template-columns: 1fr; gap: 2rem; }
      .intro-section, .divider-section { padding: 4rem 1.5rem; }
      .portfolio-section { padding: 4rem 1.5rem; }
      .contact-callout { padding: 3rem 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; text-align: center; }
    }
    @media (max-width: 600px) {
      .portfolio-grid { grid-template-columns: 1fr; }
      .portfolio-card.wide { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useRef } = React;

    const marqueeItems = [
      "GOLF OPERATIONS","DATA SCIENCE","PYTHON","TRAVEL ADVISORY","EN·ES·FR",
      "TOURNAMENT MANAGEMENT","TRACKMAN","PLAYER DEVELOPMENT","ANALYTICS","PROJECTS",
      "GOLF OPERATIONS","DATA SCIENCE","PYTHON","TRAVEL ADVISORY","EN·ES·FR",
      "TOURNAMENT MANAGEMENT","TRACKMAN","PLAYER DEVELOPMENT","ANALYTICS","PROJECTS",
    ];

    const projects = [
      {
        num: "01",
        tag: "Data Science",
        title: "Project Title",
        desc: "A short description of this project will go here — what it does, what problem it solves, and what you learned from it.",
        tools: ["Python", "Pandas", "Matplotlib"],
        link: "#",
        wide: true
      },
      {
        num: "02",
        tag: "Golf Operations",
        title: "Project Title",
        desc: "A short description of this project will go here.",
        tools: ["Excel", "Analytics"],
        link: "#",
        wide: false
      },
      {
        num: "03",
        tag: "Travel",
        title: "Project Title",
        desc: "A short description of this project will go here.",
        tools: ["Research", "Planning"],
        link: "#",
        wide: false
      },
      {
        num: "04",
        tag: "Data Science",
        title: "Project Title",
        desc: "A short description of this project will go here.",
        tools: ["Python", "SQL"],
        link: "#",
        wide: false
      },
      {
        num: "05",
        tag: "Writing",
        title: "The New Par",
        desc: "A golf publication covering the business of golf, course operations, player development, and the evolving industry landscape.",
        tools: ["Substack", "Editorial"],
        link: "https://thenewpar.substack.com",
        wide: false
      },
    ];

    function useFadeUp(delay) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setTimeout(() => el.classList.add('visible'), delay || 0); obs.disconnect(); }
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function App() {
      const introRef    = useFadeUp(0);
      const portfolioRef = useFadeUp(0);
      const dividerRef  = useFadeUp(0);
      const contactRef  = useFadeUp(0);

      useEffect(() => {
        const cur = document.getElementById('cursor'); if (!cur) return;
        let rx = 0, ry = 0;
        const mv = (e) => { rx = e.clientX; ry = e.clientY; };
        window.addEventListener('mousemove', mv);
        let raf;
        const loop = () => { cur.style.left = rx + 'px'; cur.style.top = ry + 'px'; raf = requestAnimationFrame(loop); };
        raf = requestAnimationFrame(loop);
        const on  = () => cur.classList.add('expand');
        const off = () => cur.classList.remove('expand');
        document.querySelectorAll('a, button').forEach(el => {
          el.addEventListener('mouseenter', on);
          el.addEventListener('mouseleave', off);
        });
        return () => { window.removeEventListener('mousemove', mv); cancelAnimationFrame(raf); };
      }, []);

      return (
        <>
          {/* NAV */}
          <nav>
            <a href="https://paulas.world" className="nav-logo">paulas.world</a>
            <div className="nav-right">
              <a href="https://paulas.world" className="nav-pill">← CV</a>
              <a href="#" className="nav-pill active">Portfolio</a>
            </div>
          </nav>

          {/* HERO */}
          <section className="hero">
            <div className="hero-eyebrow">portfolio.paulas.world</div>
            <h1 className="hero-name">Selected <em>Work.</em></h1>
            <p className="hero-tagline">Golf · Data Science · Travel</p>
            <div className="hero-pills">
              <span className="hero-pill">Data Projects</span>
              <span className="hero-pill">Golf Operations</span>
              <span className="hero-pill">Writing</span>
              <span className="hero-pill">Travel Advisory</span>
            </div>
            <div className="hero-scroll">
              <span>Explore</span>
              <div className="hero-scroll-line"></div>
            </div>
          </section>

          {/* MARQUEE */}
          <div className="marquee-wrap" aria-hidden="true">
            <div className="marquee-track">
              {marqueeItems.map((item, i) => <span key={i} className="marquee-item">{item}</span>)}
            </div>
          </div>

          {/* INTRO */}
          <section className="intro-section">
            <div className="intro-inner fade-up" ref={introRef}>
              <div className="intro-left">
                <div className="section-label">Portfolio</div>
                <h2>Work that<br/><em>speaks for itself.</em></h2>
              </div>
              <div className="intro-right">
                <p>A curated selection of projects spanning data science, golf operations, travel advisory, and writing — each reflecting a different dimension of what I do.</p>
                <p>More detail on each project coming soon. Check back as this page grows.</p>
              </div>
            </div>
          </section>

          {/* PORTFOLIO GRID */}
          <section className="portfolio-section">
            <div className="portfolio-inner">
              <div className="fade-up" ref={portfolioRef}>
                <div className="section-label" style={{color:'rgba(240,84,133,0.85)'}}>Projects</div>
                <h2 className="portfolio-heading">What I've <em>built.</em></h2>
              </div>
              <div className="portfolio-grid">
                {projects.map((p, i) => (
                  <div key={i} className={`portfolio-card fade-up${p.wide ? ' wide' : ''}`} ref={useFadeUp(i * 80)}>
                    <div className="card-num">{p.num}</div>
                    <div className="card-tag">{p.tag}</div>
                    <h3 className="card-title">{p.title}</h3>
                    <p className="card-desc">{p.desc}</p>
                    <div className="card-tools">
                      {p.tools.map((t, ti) => <span key={ti} className="card-tool">{t}</span>)}
                    </div>
                    <a href={p.link} className="card-link" target="_blank" rel="noopener noreferrer">
                      View project →
                    </a>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* DIVIDER */}
          <section className="divider-section">
            <div className="divider-inner fade-up" ref={dividerRef}>
              <div className="divider-left">
                <div className="section-label">About this page</div>
                <h2>Always<br/><em>in progress.</em></h2>
              </div>
              <div className="divider-right">
                <p>This portfolio is a living document — projects will be added and expanded as work develops across data science, golf operations, and advisory.</p>
                <p>For the full professional background, visit <a href="https://paulas.world">paulas.world</a>.</p>
              </div>
            </div>
          </section>

          {/* CONTACT CALLOUT */}
          <div className="contact-callout">
            <div className="fade-up" ref={contactRef}>
              <div className="section-label" style={{color:'rgba(255,255,255,0.7)'}}>Get in touch</div>
              <h2>Let's work together.</h2>
              <p>Interested in collaborating or learning more about any of these projects?</p>
              <a href="mailto:paula@paulas.world" className="contact-btn">paula@paulas.world →</a>
            </div>
          </div>

          {/* FOOTER */}
          <footer>
            <span className="footer-logo">paulas.world</span>
            <span className="footer-copy">© 2026 Paula Zambrano</span>
            <span className="footer-note">portfolio.paulas.world — all rights reserved</span>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
