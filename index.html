            link: "#", wide: false, comingSoon: true

          {

            tag: "Análisis de Mercado",
            title: "Análisis del Mercado de Moda de Lujo",

            tools: ["Python", "Tableau", "Análisis de Mercado", "Estrategia Competitiva"],

            tools: ["Python", "Tableau", "Análisis de Mercado", "Estrategia de Marca"],
            link: "#", wide: false, comingSoon: true
          },

        divider_label: "Sobre esta página",
        divider_h_a: "Siempre",
        divider_h_b: "en progreso.",
        divider_p1: "Este portfolio es un documento vivo — se añadirán y ampliarán proyectos a medida que avance el trabajo en ciencia de datos, operaciones de golf y asesoría.",
        divider_p2: "Para el perfil profesional completo, visita",
        contact_label: "Contacto",

        contact_p: "¿Interesado en colaborar o saber más sobre alguno de estos proyectos?",
        footer_note: "portfolio.paulas.world — todos los derechos reservados",
      },
    };

    function useFadeUp(delay) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setTimeout(() => el.classList.add('visible'), delay || 0); obs.disconnect(); }
        }, { threshold: 0.1 });
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function App() {
      const [lang, setLang] = useState('en');
      const t = T[lang];

      const introRef     = useFadeUp(0);
      const portfolioRef = useFadeUp(0);
      const dividerRef   = useFadeUp(0);
      const contactRef   = useFadeUp(0);

      useEffect(() => {
        const cur = document.getElementById('cursor'); if (!cur) return;
        let rx = 0, ry = 0;
        const mv = (e) => { rx = e.clientX; ry = e.clientY; };
        window.addEventListener('mousemove', mv);
        let raf;
        const loop = () => { cur.style.left = rx + 'px'; cur.style.top = ry + 'px'; raf = requestAnimationFrame(loop); };
        raf = requestAnimationFrame(loop);
        const on  = () => cur.classList.add('expand');
        const off = () => cur.classList.remove('expand');
        document.querySelectorAll('a, button').forEach(el => {
          el.addEventListener('mouseenter', on);
          el.addEventListener('mouseleave', off);
        });
        return () => { window.removeEventListener('mousemove', mv); cancelAnimationFrame(raf); };
      }, []);

      return (
        <>
          {/* BANNER */}
          <div className="under-construction">🚧 Under Construction</div>

          {/* NAV */}
          <nav>
            <a href="https://paulas.world" className="nav-logo">paulas.world</a>
            <div className="nav-right">
              <a href="https://paulas.world" className="nav-pill">{t.nav_cv}</a>
              <a href="#" className="nav-pill active">{t.nav_portfolio}</a>
              <button className={`lang-toggle ${lang==='en'?'active':''}`} onClick={()=>setLang('en')}>EN</button>
              <button className={`lang-toggle ${lang==='fr'?'active':''}`} onClick={()=>setLang('fr')}>FR</button>
              <button className={`lang-toggle ${lang==='es'?'active':''}`} onClick={()=>setLang('es')}>ES</button>
            </div>
          </nav>

          {/* HERO */}
          <section className="hero">
            <div className="hero-eyebrow">{t.hero_eyebrow}</div>
            <h1 className="hero-name">{t.hero_h1_a} <em>{t.hero_h1_b}</em></h1>
            <p className="hero-tagline">{t.hero_tagline}</p>
            <div className="hero-pills">
              {t.hero_pills.map((p, i) => <span key={i} className="hero-pill">{p}</span>)}
            </div>
            <div className="hero-scroll">
              <span>{t.hero_scroll}</span>
              <div className="hero-scroll-line"></div>
            </div>
          </section>

          {/* MARQUEE */}
          <div className="marquee-wrap" aria-hidden="true">
            <div className="marquee-track">
              {t.marquee.map((item, i) => <span key={i} className="marquee-item">{item}</span>)}
            </div>
          </div>

          {/* INTRO */}
          <section className="intro-section">
            <div className="intro-inner fade-up" ref={introRef}>
              <div className="intro-left">
                <div className="section-label">{t.intro_label}</div>
                <h2>{t.intro_h_a}<br/><em>{t.intro_h_b}</em></h2>
              </div>
              <div className="intro-right">
                <p>{t.intro_p1}</p>
                <p>{t.intro_p2}</p>
              </div>
            </div>
          </section>

          {/* PORTFOLIO GRID */}
          <section className="portfolio-section">
            <div className="portfolio-inner">
              <div className="fade-up" ref={portfolioRef}>
                <div className="section-label" style={{color:'rgba(240,84,133,0.85)'}}>{t.projects_label}</div>
                <h2 className="portfolio-heading">{t.projects_h_a} <em>{t.projects_h_b}</em></h2>
              </div>
              <div className="portfolio-grid">
                {t.projects.map((p, i) => (
                  <div key={i} className={`portfolio-card fade-up${p.wide ? ' wide' : ''}`} ref={useFadeUp(i * 80)}>
                    <div className="card-num">{p.num}</div>
                    <div className="card-tag">{p.tag}</div>
                    <h3 className="card-title">{p.title}</h3>
                    <p className="card-desc">{p.desc}</p>
                    <div className="card-tools">
                      {p.tools.map((tool, ti) => <span key={ti} className="card-tool">{tool}</span>)}
                    </div>
                    {p.comingSoon ? (
                      <span className="coming-soon-badge">Coming Soon</span>
                    ) : (
                      <div style={{display:'flex',gap:'1.25rem',alignItems:'center',flexWrap:'wrap'}}>
                        <a href={p.link} className="card-link" target={p.link.startsWith('http') ? '_blank' : '_self'} rel="noopener noreferrer">
                          {t.card_link}
                        </a>
                        {p.link2 && (
                          <a href={p.link2} className="card-link" target="_blank" rel="noopener noreferrer" style={{color:'rgba(230,230,218,0.4)'}}>
                            GitHub ↗
                          </a>
                        )}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* DIVIDER */}
          <section className="divider-section">
            <div className="divider-inner fade-up" ref={dividerRef}>
              <div className="divider-left">
                <div className="section-label">{t.divider_label}</div>
                <h2>{t.divider_h_a}<br/><em>{t.divider_h_b}</em></h2>
              </div>
              <div className="divider-right">
                <p>{t.divider_p1}</p>
                <p>{t.divider_p2} <a href="https://paulas.world">paulas.world</a>.</p>
              </div>
            </div>
          </section>

          {/* CONTACT CALLOUT */}
          <div className="contact-callout">
            <div className="fade-up" ref={contactRef}>
              <div className="section-label" style={{color:'rgba(255,255,255,0.7)'}}>{t.contact_label}</div>
              <h2>{t.contact_h}</h2>
              <p>{t.contact_p}</p>
              <a href="mailto:paula@paulas.world" className="contact-btn">paula@paulas.world →</a>
            </div>
          </div>

          {/* FOOTER */}
          <footer>
            <span className="footer-logo">paulas.world</span>
            <span className="footer-copy">© 2026 Paula Zambrano</span>
            <span className="footer-note">{t.footer_note}</span>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
